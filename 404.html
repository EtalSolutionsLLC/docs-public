<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 | Page Not Found</title>
  <style>
    :root {
      --bg: #000000;
      --silver: #c1bfc0;
      --chrome: #c0c0c0;
      --blue: #123bff;
      --violet: #9b5de5;
      --green: #00ffb2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--silver);
      background:
        radial-gradient(circle at 20% 30%, rgba(18, 59, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(155, 93, 229, 0.14), transparent 30%),
        repeating-radial-gradient(
          ellipse at center,
          rgba(92, 58, 29, 0.18) 0,
          rgba(38, 23, 12, 0.16) 8px,
          rgba(9, 6, 4, 0.24) 17px,
          rgba(64, 38, 18, 0.14) 28px
        ),
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.035) 0,
          rgba(255, 255, 255, 0.01) 14%,
          rgba(0, 0, 0, 0.22) 33%,
          rgba(130, 82, 38, 0.08) 47%,
          rgba(0, 0, 0, 0.28) 63%,
          rgba(255, 255, 255, 0.025) 100%
        ),
        linear-gradient(135deg, #050302 0%, #0b0704 45%, #000000 100%);
      background-blend-mode: screen, screen, overlay, soft-light, normal;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          92deg,
          rgba(255, 255, 255, 0.035) 0px,
          rgba(255, 255, 255, 0.008) 2px,
          rgba(0, 0, 0, 0.18) 5px,
          rgba(84, 48, 22, 0.07) 9px,
          rgba(0, 0, 0, 0.22) 14px
        );
      opacity: 0.75;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.25), transparent 40%, rgba(0, 0, 0, 0.55)),
        radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.72) 78%);
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .card {
      width: min(760px, 100%);
      padding: clamp(32px, 6vw, 72px);
      border: 1px solid rgba(193, 191, 192, 0.2);
      border-radius: 28px;
      background: rgba(0, 0, 0, 0.62);
      box-shadow:
        0 0 60px rgba(18, 59, 255, 0.22),
        inset 0 0 38px rgba(255, 255, 255, 0.035);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--green);
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(5rem, 20vw, 12rem);
      line-height: 0.9;
      color: var(--chrome);
      text-shadow:
        0 0 18px rgba(18, 59, 255, 0.85),
        0 0 42px rgba(18, 59, 255, 0.38);
    }

    h2 {
      margin: 18px 0 0;
      font-size: clamp(1.8rem, 5vw, 3.25rem);
      color: #ffffff;
      letter-spacing: -0.04em;
    }

    p {
      max-width: 560px;
      margin: 20px auto 0;
      color: rgba(193, 191, 192, 0.86);
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.65;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    a.primary {
      background: var(--blue);
      box-shadow: 0 0 28px rgba(18, 59, 255, 0.45);
    }

    a.secondary {
      border: 1px solid rgba(193, 191, 192, 0.35);
      background: rgba(255, 255, 255, 0.045);
      color: var(--silver);
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 0 32px rgba(18, 59, 255, 0.58);
      outline: none;
    }

    .line {
      width: 84px;
      height: 3px;
      margin: 28px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--violet), var(--green));
      box-shadow: 0 0 18px rgba(18, 59, 255, 0.75);
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="page-title">
      <p class="eyebrow">Page not found</p>
      <h1>404</h1>
      <h2 id="page-title">This page wandered off.</h2>
      <div class="line" aria-hidden="true"></div>
      <p>
        This page has either moved, vanished, or achieved a level of privacy to which most websites can only aspire.
      </p>
      <div class="actions">
        <a class="primary" id="home-link" href="/">Back to Home</a>
        <a class="secondary" href="javascript:history.back()">Go Back</a>
      </div>
      
      <script>
        (function () {
          var homeLink = document.getElementById("home-link");
          var host = window.location.hostname;
          var pathParts = window.location.pathname.split("/").filter(Boolean);
      
          var isGithubPages = host.endsWith(".github.io");
          var isProjectPage = isGithubPages && pathParts.length > 0;
      
          homeLink.href = isProjectPage ? "/" + pathParts[0] + "/" : "/";
        })();
      </script>
    </section>
  </main>
</body>
</html>
